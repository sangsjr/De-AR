<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Magic Window Hub</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <style>body { margin: 0; overflow: hidden; }</style>

        <script>
        // ---------------------------------------------------
        // 1. Global Parameters
        // ---------------------------------------------------
        const LONG_PINCH_DURATION = 2000; // Long-pinch duration for all interactions (2s)
        const PREVIEW_DURATION = 1000;    // Duration for previewing the original geometry (1s)
        const COLOR_DEFAULT_ZONE = '#007AFF'; // Primary UI and Wireframe color
        const ELEMENT_SIZE = 0.1; // Base size for randomly spawned objects
        const RAY_VISIBLE_DISTANCE = 0.2; // Display rays within 20cm of the menu

        // State Variables
        window.ActiveMode = 'none'; // Current active module: 'plane', 'shapes', 'draw'
        window.DrawState = { enabled: false }; // State for 'draw' module: enabled or disabled
        let activeMasksCount = 0; // Number of active "Magic Mask" in the scene
        
        // ---------------------------------------------------
        // Set the Raycaster, making the ray parallel to the index finger
        // ---------------------------------------------------
        AFRAME.registerComponent('hand-ray-sync', {
            schema: { hand: {type: 'string', default: 'left'} },
            tick: function() {
                const sceneEl = this.el.sceneEl;
                if (!sceneEl || !sceneEl.frame || !sceneEl.renderer.xr) return;
                
                const xr = sceneEl.renderer.xr;
                const session = xr.getSession();
                
                if (!session) {
                    this.el.object3D.visible = false;
                    return;
                }
                
                let targetSource = null;
                for (const source of session.inputSources) {
                    if (source.handedness === this.data.hand) {
                        targetSource = source;
                        break;
                    }
                }
                
                if (targetSource) {
                    const refSpace = xr.getReferenceSpace();
                    if (!refSpace) return;

                    // 1. Use hand skeleton tracking data (XRHand API)
                    if (targetSource.hand) {
                        // Obtain the tip of the index finger and the proximal joint of the index finger root.
                        const indexTip = targetSource.hand.get('index-finger-tip');
                        const indexBase = targetSource.hand.get('index-finger-phalanx-proximal');
                        
                        if (indexTip && indexBase) {
                            const tipPose = sceneEl.frame.getJointPose(indexTip, refSpace);
                            const basePose = sceneEl.frame.getJointPose(indexBase, refSpace);
                            
                            if (tipPose && basePose) {
                                // Extract Three.js vector
                                const vecTip = new THREE.Vector3(tipPose.transform.position.x, tipPose.transform.position.y, tipPose.transform.position.z);
                                const vecBase = new THREE.Vector3(basePose.transform.position.x, basePose.transform.position.y, basePose.transform.position.z);
                                
                                // Calculate the direction vector from the root to the fingertip
                                const dir = new THREE.Vector3().subVectors(vecTip, vecBase).normalize();
                                
                                // Set the starting point of the ray at the tip of the index finger
                                this.el.object3D.position.copy(vecTip);
                                this.el.object3D.lookAt(vecTip.clone().sub(dir));
                                
                                this.el.object3D.visible = true;
                                return;
                            }
                        }
                    }

                    // 2. Insurance plan
                    // If a single finger skeleton cannot be read on certain devices, return to the standard targetRaySpace
                    if (targetSource.targetRaySpace) {
                        const pose = sceneEl.frame.getPose(targetSource.targetRaySpace, refSpace);
                        if (pose) {
                            const p = pose.transform.position;
                            const q = pose.transform.orientation;
                            this.el.object3D.position.set(p.x, p.y, p.z);
                            this.el.object3D.quaternion.set(q.x, q.y, q.z, q.w);
                            this.el.object3D.visible = true;
                            return;
                        }
                    }
                }
                
                this.el.object3D.visible = false;
            }
        });

        // ---------------------------------------------------
        // 2. CORE RENDERING COMPONENTS (Stencil Buffer Logic)
        // ---------------------------------------------------

        /**
         * Component: apply-magic-shader
         * Purpose: Attached to standard objects to make them hideable by "Magic Windows".
         * Logic: Uses the Stencil Buffer. If a mask exists, the object only renders where the mask is NOT present.
         */
        AFRAME.registerComponent('apply-magic-shader', {
            schema: { color: {type: 'color', default: '#FFFFFF'} },
            init: function() {
                this.applyMat = () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (!mesh) return;
                    mesh.material = new THREE.MeshStandardMaterial({
                        color: new THREE.Color(this.data.color),
                        transparent: true,
                        opacity: 1.0,
                        stencilWrite: true, // Tells the GPU to pay attention to the stencil buffer
                        stencilRef: 1,      // The ID we are looking for in the buffer
                        // If masks exist, use NotEqualStencilFunc to hide parts overlapping the mask
                        stencilFunc: (activeMasksCount > 0) ? THREE.NotEqualStencilFunc : THREE.AlwaysStencilFunc,
                        stencilZPass: THREE.KeepStencilOp // Don't change the buffer, just read it
                    });
                };
                if (this.el.getObject3D('mesh')) this.applyMat();
                else this.el.addEventListener('model-loaded', this.applyMat);
            },
            // Updates stencil logic when a mask is added or removed from the scene
            updateStencil: function(isActive) {
                const mesh = this.el.getObject3D('mesh');
                if (mesh && mesh.material) {
                    mesh.material.stencilFunc = isActive ? THREE.NotEqualStencilFunc : THREE.AlwaysStencilFunc;
                }
            }
        });

        /**
         * Function: getMagicMaterials
         * Purpose: Generates the two special materials needed for the Magic Window.
         * 1. maskMat: Invisible material that "cuts a hole" by writing to the Stencil Buffer.
         * 2. outlineMat: A shader material that renders a glowing border around the mask area.
        */
        function getMagicMaterials() {
            // 1. THE MASK: This is the "Invisibility Cloak".
            // It doesn't have a color (colorWrite: false), but it writes a '1' into the Stencil Buffer.
            const maskMat = new THREE.MeshBasicMaterial({ 
                colorWrite: false,
                depthWrite: false,
                stencilWrite: true, 
                stencilRef: 1,
                stencilFunc: THREE.AlwaysStencilFunc,
                stencilZPass: THREE.ReplaceStencilOp // REPLACES the buffer value with '1' where this mesh sits
            });

            // 2. THE BLUE OUTLINE: Custom Shader.
            // vertexShader: Expands the mesh slightly (position + normal * thickness) to create an outer shell.
            // stencilFunc: NotEqualStencilFunc ensures the blue border doesn't cover the "hole" itself.
            const outlineMat = new THREE.ShaderMaterial({
                uniforms: {
                    thickness: { value: 0.005 }, // Width of the blue border
                    color: { value: new THREE.Color(COLOR_DEFAULT_ZONE) } }, // Set color
                // Pushes vertices outward for outline effect
                vertexShader: `
                    uniform float thickness; 
                    void main() {
                        vec3 pos = position + normal * thickness;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }`,
                fragmentShader: `uniform vec3 color; void main() { gl_FragColor = vec4(color, 1.0); }`,
                side: THREE.BackSide, // Renders the inside-out faces to show the border behind the mask
                stencilWrite: true,
                stencilRef: 1, 
                stencilFunc: THREE.NotEqualStencilFunc,
                stencilZPass: THREE.KeepStencilOp
            });
            return { maskMat, outlineMat };
        }

        // Helper: Check if the right hand is currently holding an object
        const isRightHandBusy = () => {
            const rh = document.getElementById('rightHand').components['hand-tracking-grab-controls'];
            return !!(rh && rh.grabbedEl);
        };
        

        // ---------------------------------------------------
        // 3. INTERACTION MODULES (Logic for each Mode)
        // ---------------------------------------------------

        /**
         * Mode A: 2D Plane
         * Trigger: Pinch both hands simultaneously for 2s.
         */
        AFRAME.registerComponent('logic-window-plane', {
            init: function() {
                this.isL = false; this.isR = false;
                this.check = () => { if(this.isL && this.isR && !isRightHandBusy()) this.spawn(this.lp); };
                this.el.sceneEl.addEventListener('pinchstarted', (e) => {
                    if(window.ActiveMode !== 'plane' || isRightHandBusy()) return;
                    if(e.target.id === 'leftHand') { this.isL = true; this.lp = e.detail.position.clone(); }
                    if(e.target.id === 'rightHand') this.isR = true;
                    if(this.isL && this.isR) this.timer = setTimeout(this.check, LONG_PINCH_DURATION);
                });
                this.el.sceneEl.addEventListener('pinchended', (e) => {
                    if(e.target.id === 'leftHand') this.isL = false;
                    if(e.target.id === 'rightHand') this.isR = false;
                    clearTimeout(this.timer); // Cancels create if hands release before 2s
                });
            },
            spawn: function(pos) {
                const win = document.createElement('a-entity');
                const geo = new THREE.PlaneGeometry(0.4, 0.3);

                // Stage 1: Wireframe Preview
                // EdgesGeometry + LineSegments create the initial hollow blue rectangle
                const previewLines = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: COLOR_DEFAULT_ZONE }));
                win.setObject3D('preview', previewLines);
                win.setAttribute('position', pos); win.setAttribute('grabbable', ''); win.classList.add('magic-window');
                
                // Orient towards camera on spawn
                const cam = new THREE.Vector3(); document.getElementById('mainCamera').object3D.getWorldPosition(cam);
                win.addEventListener('loaded', () => win.object3D.lookAt(cam));
                this.el.sceneEl.appendChild(win);

                // Stage 2: Conversion to Stencil Mask after preview timeout
                setTimeout(() => {
                    win.removeObject3D('preview'); // Deletes the simple blue lines
                    const mats = getMagicMaterials();
                    win.setObject3D('mask', new THREE.Mesh(geo, mats.maskMat)); // Creates the stencil mask

                    // Create the blue outline around the mask
                    const outline = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({
                        color: COLOR_DEFAULT_ZONE, stencilWrite: true, stencilRef: 1, stencilFunc: THREE.NotEqualStencilFunc, stencilZPass: THREE.KeepStencilOp
                    }));
                    win.setObject3D('outline', outline);
                    activeMasksCount++;

                    // Update all entities with apply-magic-shader to apply the stencil mask
                    document.querySelectorAll('[apply-magic-shader]').forEach(o => o.components['apply-magic-shader'].updateStencil(true));
                }, PREVIEW_DURATION);
            }
        });

        /**
         * Mode B: 3D Shapes
         * Trigger: Left hand pinch 2s -> Cone, Right hand pinch 2s -> Box.
         */
        AFRAME.registerComponent('logic-3d-shapes', {
            init: function() {
                this.ts = { leftHand: null, rightHand: null };
                const setup = (id) => {
                    const el = document.getElementById(id);
                    el.addEventListener('pinchstarted', (evt) => {
                        if(window.ActiveMode !== 'shapes' || isRightHandBusy()) return;
                        this.ts[id] = setTimeout(() => { 
                            if(!isRightHandBusy()) this.spawn(id, evt.detail.position); 
                        }, LONG_PINCH_DURATION);
                    });
                    el.addEventListener('pinchended', () => clearTimeout(this.ts[id]));
                };
                setup('leftHand'); setup('rightHand');
            },
            spawn: function(hand, pos) {
                const win = document.createElement('a-entity');
                // Selects Geometry: Left Hand = Cone, Right Hand = Box
                const geo = (hand === 'leftHand') ? new THREE.ConeGeometry(0.2, 0.4, 32) : new THREE.BoxGeometry(0.4, 0.3, 0.4);
                
                // Stage 1: Wireframe Preview (visible entity)
                const previewLines = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: COLOR_DEFAULT_ZONE }));
                win.setObject3D('preview', previewLines);
                win.setAttribute('position', pos); win.setAttribute('grabbable', ''); win.classList.add('magic-window');
                this.el.sceneEl.appendChild(win);

                // Stage 2: Morph into Stencil Mask (invisible volume that hides objects)
                setTimeout(() => {
                    win.removeObject3D('preview');
                    const mats = getMagicMaterials();
                    win.setObject3D('mask', new THREE.Mesh(geo, mats.maskMat)); // Invisible volume
                    win.setObject3D('outline', new THREE.Mesh(geo, mats.outlineMat)); // Visible outline
                    activeMasksCount++;
                    document.querySelectorAll('[apply-magic-shader]').forEach(o => o.components['apply-magic-shader'].updateStencil(true));
                }, PREVIEW_DURATION);
            }
        });

        /**
         * Mode C: Draw Any
         * Trigger: Left hand pinch 2s to start drawing mode, right hand pinch to draw.
         */
        AFRAME.registerComponent('logic-draw-any', {
            init: function() {
                this.lh = document.getElementById('leftHand');
                this.rh = document.getElementById('rightHand');

                // Activation logic
                this.lh.addEventListener('pinchstarted', () => {
                    if(window.ActiveMode !== 'draw' || isRightHandBusy()) return;
                    this.timer = setTimeout(() => { 
                        window.DrawState.enabled = true;
                        this.rh.setAttribute('hand-tracking-grab-controls', 'enabled', false);
                        document.querySelector('#modeText').setAttribute('value', 'DRAWING: ON');
                    }, LONG_PINCH_DURATION);
                });
                this.lh.addEventListener('pinchended', () => clearTimeout(this.timer));

                // Drawing logic (Tracking the path)
                this.rh.addEventListener('pinchstarted', (e) => {
                    if(!window.DrawState.enabled) return;
                    this.pts = []; this.org = e.detail.position.clone();
                    const camObj = this.el.sceneEl.camera.el.object3D;
                    this.bQuat = camObj.quaternion.clone();
                    this.iQuat = this.bQuat.clone().invert();

                    // Temp line entity to visualize drawing
                    this.lineGeo = new THREE.BufferGeometry();
                    this.lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(9000), 3));
                    this.lineEnt = document.createElement('a-entity');
                    this.lineEnt.setObject3D('mesh', new THREE.Line(this.lineGeo, new THREE.LineBasicMaterial({color: COLOR_DEFAULT_ZONE})));
                    this.lineEnt.object3D.position.copy(this.org);
                    this.lineEnt.object3D.quaternion.copy(this.bQuat);
                    this.el.sceneEl.appendChild(this.lineEnt);
                    this.isDraw = true;
                });
                this.rh.addEventListener('pinchmoved', (e) => {
                    if(!this.isDraw) return;
                    const p = e.detail.position.clone().sub(this.org).applyQuaternion(this.iQuat);
                    this.pts.push(p);
                    const attr = this.lineGeo.attributes.position;
                    attr.setXYZ(this.pts.length-1, p.x, p.y, p.z); attr.needsUpdate = true;
                    this.lineGeo.setDrawRange(0, this.pts.length);
                });
                this.rh.addEventListener('pinchended', () => {
                    if(!this.isDraw) return;
                    this.createMask(); this.el.sceneEl.removeChild(this.lineEnt);
                    this.isDraw = false; window.DrawState.enabled = false;
                    this.rh.setAttribute('hand-tracking-grab-controls', 'enabled', true);
                    document.querySelector('#modeText').setAttribute('value', 'Active: DRAW ANY');
                });
            },

            // Generate a filled 2D shape from the hand-drawn points
            createMask: function() {
                if(this.pts.length < 3) return;
                const shape = new THREE.Shape(); shape.moveTo(this.pts[0].x, this.pts[0].y);
                this.pts.forEach(p => shape.lineTo(p.x, p.y));
                const geo = new THREE.ShapeGeometry(shape);
                const ent = document.createElement('a-entity');

                const edgeGeo = new THREE.BufferGeometry().setFromPoints([...this.pts, this.pts[0]]);
                
                // Convert immediately to Mask without preview delay
                const mats = getMagicMaterials();
                ent.setObject3D('mask', new THREE.Mesh(geo, mats.maskMat));
                
                const outline = new THREE.Line(edgeGeo, new THREE.LineBasicMaterial({
                    color: COLOR_DEFAULT_ZONE, stencilWrite: true, stencilRef: 1, stencilFunc: THREE.NotEqualStencilFunc, stencilZPass: THREE.KeepStencilOp
                }));
                ent.setObject3D('outline', outline);
                
                ent.setAttribute('position', this.org); 
                ent.object3D.quaternion.copy(this.bQuat);
                ent.setAttribute('grabbable', ''); 
                ent.classList.add('magic-mask');
                this.el.sceneEl.appendChild(ent);

                activeMasksCount++;
                document.querySelectorAll('[apply-magic-shader]').forEach(o => o.components['apply-magic-shader'].updateStencil(true));
            }
        });

        /**
         * General Interaction: create, delete objects
         * Logic: Quickly double pinch left hand (within 300ms) to create or delete (with right hand hold) objects.
         */
        AFRAME.registerComponent('general-interaction', {
            // Handle quick double pinch to create or delete objects
            init: function () {
                this.lastPinchTime = 0;
                this.el.addEventListener('pinchstarted', (evt) => {
                    if (this.el.id !== 'leftHand') return;
                    const now = Date.now();
                    if (now - this.lastPinchTime < 300) {
                        const rhGrab = document.getElementById('rightHand').components['hand-tracking-grab-controls'];
                        const grabbed = rhGrab ? rhGrab.grabbedEl : null;
                        if (grabbed && !grabbed.classList.contains('magic-window') && !grabbed.classList.contains('magic-mask')) {
                            grabbed.parentNode.removeChild(grabbed); // Delete object if held in right hand
                        } else { this.spawn(evt.detail.position); } // Create new object if not held
                        this.lastPinchTime = 0;
                    } else { this.lastPinchTime = now; }
                });
            },
            // Create a new object at the given position
            spawn: function(pos) {
                const el = document.createElement(Math.random() < 0.5 ? 'a-box' : 'a-sphere');
                el.setAttribute('position', pos);
                el.setAttribute('apply-magic-shader', `color: #${Math.floor(Math.random()*16777215).toString(16)}`);
                el.setAttribute('grabbable', '');
                if (el.tagName === 'A-BOX') el.setAttribute('geometry', {primitive:'box', width:ELEMENT_SIZE, height:ELEMENT_SIZE, depth:ELEMENT_SIZE});
                else el.setAttribute('geometry', {primitive:'sphere', radius:ELEMENT_SIZE/2});
                this.el.sceneEl.appendChild(el);
            }
        });


        // ---------------------------------------------------
        // 4. SYSTEM CONTROL (Menu & UI Positioning)
        // ---------------------------------------------------
        AFRAME.registerComponent('hub-controller', {
            init: function() {
                const btns = document.querySelectorAll('.menu-btn');
                
                this.selectMenu = (btn) => {
                    window.ActiveMode = btn.id.replace('btn-', '');
                    
                    // Visual Feedback for Menu
                    btns.forEach(b => b.setAttribute('color', '#333')); btn.setAttribute('color', '#007AFF');
                    document.querySelector('#modeText').setAttribute('value', 'Active: ' + window.ActiveMode.toUpperCase());
                    
                    // Clear all existing masks when switching modes
                    document.querySelectorAll('.magic-window, .magic-mask').forEach(el => el.parentNode.removeChild(el));
                    activeMasksCount = 0;
                    document.querySelectorAll('[apply-magic-shader]').forEach(o => o.components['apply-magic-shader'].updateStencil(false));
                };

                // Right hand: hand-ray-sync component
                const createRaycasterEntity = (handName) => {
                    const rayEl = document.createElement('a-entity');
                    rayEl.setAttribute('hand-ray-sync', `hand: ${handName}`); 
                    rayEl.setAttribute('raycaster', 'objects: .menu-btn; showLine: true; lineColor: #007AFF;');
                    this.el.sceneEl.appendChild(rayEl);
                    return rayEl;
                };

                this.rightRay = createRaycasterEntity('right');
                
                // Distance Touch Status Variable
                this.lastHitBtn = null;
                this.cooldown = 0;
            },
            
            // Use tick to detect distance per frame
            // Implement dynamic ray and click effect
            tick: function(time, timeDelta) {
                // 1. Dynamic ray visibility (based on global variable distance)
                const menuEl = document.getElementById('menu-panel');
                if (menuEl && this.rightRay) {
                    const menuPos = new THREE.Vector3();
                    menuEl.object3D.getWorldPosition(menuPos);
                    const handPos = new THREE.Vector3();
                    this.rightRay.object3D.getWorldPosition(handPos);
                    
                    // Determine whether to display the ray
                    const isNear = handPos.distanceTo(menuPos) < RAY_VISIBLE_DISTANCE;
                    if (this.rightRay.hasAttribute('line')) {
                        // Setting transparency to control visibility
                        this.rightRay.setAttribute('line', 'opacity', isNear ? 1 : 0);
                    }
                }

                // 2. Spatial click judgment
                // If in cooling state, reduce cooling time
                if (this.cooldown > 0) {
                    this.cooldown -= timeDelta;
                    return;
                }

                const raycaster = this.rightRay.components.raycaster;
                
                // Ensure that raycaster is running and has intersections
                if (raycaster && raycaster.intersections && raycaster.intersections.length > 0) {
                    const hitEl = raycaster.intersectedEls[0];
                    const distance = raycaster.intersections[0].distance; // The exact distance from fingertip to button

                    // If the ray passed through the menu button
                    if (hitEl && hitEl.classList.contains('menu-btn')) {
                        // Click the detection threshold: 3 cm
                        // If it is less than this distance, it is judged that the fingertip clicked the button!
                        if (distance < 0.03) {
                            if (this.lastHitBtn !== hitEl) {
                                this.selectMenu(hitEl);
                                this.lastHitBtn = hitEl;
                                this.cooldown = 1000; // Click cooldown: locked for 1 second after a successful select
                            }
                        } else {
                            // If the distance is greater than 3cm, you can prepare for the next click.
                            this.lastHitBtn = null;
                        }
                    }
                } else {
                    // No contact with anything, reset status
                    this.lastHitBtn = null;
                }
            }
        });

        // Ensure menu create in front of the player upon entering AR
        AFRAME.registerComponent('menu-spawner', {
            init: function() {
                this.el.sceneEl.addEventListener('enter-vr', () => {
                    const camObj = document.getElementById('mainCamera').object3D;
                    // Menu location
                    const offset = new THREE.Vector3(0.3, -0.8, -0.5); 
                    this.el.object3D.position.copy(offset.applyMatrix4(camObj.matrixWorld));
                    
                    // Raise around the X axis -60 degrees
                    const targetRotation = new THREE.Euler(
                        THREE.MathUtils.degToRad(-60), // Menu tilt angle
                        camObj.rotation.y, 
                        0, 
                        'YXZ'
                    );
                    this.el.object3D.setRotationFromEuler(targetRotation);
                });
            }
        });
    </script>
</head>
<body>
    <a-scene xr-mode-ui="XRMode: ar" renderer="stencil: true; colorManagement: true;">
        <a-camera id="mainCamera">
            <a-text id="modeText" value="Select a Module" position="0 0.3 -0.8" align="center" scale="0.2"></a-text>
        </a-camera>
        <a-entity id="menu-panel" menu-spawner hub-controller position="0.3 1.5 -0.6">
            <a-plane color="#222" width="0.3" height="0.4" opacity="0.9">
                <a-text value="MAGIC HUB" align="center" position="0 0.15 0.01" scale="0.18 0.18 0.18"></a-text>
                <a-plane id="btn-plane" class="menu-btn" color="#333" width="0.24" height="0.06" position="0 0.07 0.02"><a-text value="2D Window" align="center" scale="0.1 0.1 0.1"></a-text></a-plane>
                <a-plane id="btn-shapes" class="menu-btn" color="#333" width="0.24" height="0.06" position="0 -0.01 0.02"><a-text value="3D Shapes" align="center" scale="0.1 0.1 0.1"></a-text></a-plane>
                <a-plane id="btn-draw" class="menu-btn" color="#333" width="0.24" height="0.06" position="0 -0.09 0.02"><a-text value="Draw Any" align="center" scale="0.1 0.1 0.1"></a-text></a-plane>
            </a-plane>
        </a-entity>
        <a-entity id="leftHand" hand-tracking-controls="hand: left" general-interaction logic-window-plane logic-3d-shapes logic-draw-any></a-entity>
        <a-entity id="rightHand" hand-tracking-controls="hand: right" hand-tracking-grab-controls="hand: right" general-interaction></a-entity>
        <a-sphere position="0 1.2 -0.8" radius="0.1" apply-magic-shader="color: #00FF00" grabbable></a-sphere>
        <a-box position="0.3 1.2 -0.8" scale="0.15 0.15 0.15" apply-magic-shader="color: #FF0000" grabbable></a-box>
    </a-scene>
</body>
</html>
